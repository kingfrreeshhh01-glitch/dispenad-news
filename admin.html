<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin - Tambah Berita</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Desain Khusus Form Input Admin */
        .form-container {
            background: white;
            border: 3px solid #16162a;
            box-shadow: 6px 6px 0px #16162a;
            padding: 30px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #16162a;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #16162a;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        .btn-submit {
            background: #4B5320;
            color: white;
            border: 3px solid #16162a;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0px #16162a;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #16162a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Dispen<span>AD</span></div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="berita.html">BERITA</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <main class="news-container" style="max-width: 800px; margin: 40px auto; padding: 0 20px; display: block;">
        <div class="section-title">Panel Admin - Tambah Berita Baru</div>
        
        <div class="form-container">
            <form id="formBerita">
                <div class="form-group">
                    <label for="title">Judul Berita</label>
                    <input type="text" id="title" placeholder="Masukkan judul berita..." required>
                </div>
                
                <div class="form-group">
                    <label for="image">Link Alamat Gambar/Foto</label>
                    <input type="url" id="image" placeholder="Contoh: https://picsum.photos/800/450 atau img/foto.jpg" required>
                </div>
                
                <div class="form-group">
                    <label for="content">Isi Konten Artikel Berita (Gunakan tag p untuk paragraf)</label>
                    <textarea id="content" placeholder="Tulis isi berita di sini..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Simpan & Publikasikan Berita</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-logo">Dispen<span>AD</span></div>
            <div class="footer-info">PANEL ADMIN LOCAL STORAGE</div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Menangkap event submit saat tombol diklik
        document.getElementById('formBerita').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah halaman reload otomatis
            
            // Jalankan fungsi addNews bawaan dari script.js
            addNews(); 
            
            // Reset form agar kosong kembali setelah berhasil menyimpan
            this.reset();
        });
    </script>
</body>
</html>
